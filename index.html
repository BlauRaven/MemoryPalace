<!DOCTYPE html>
<html>
  <head>
    <title>Memory Palace</title>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      h1 {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-family: 'Georgia', 'Garamond', serif;
        color: #2c3e50;
        z-index: 10;
        margin: 0;
        padding: 15px 40px;
        background: linear-gradient(135deg, rgba(255, 223, 186, 0.85) 0%, rgba(255, 195, 113, 0.85) 100%);
        border-radius: 50px;
        box-shadow: 0 8px 32px rgba(255, 152, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        font-size: 2.5em;
        font-weight: bold;
        letter-spacing: 1px;
      }
      #map {
        height: 100%;
        width: 100%;
        animation: fadeIn 2s ease-out;
      }
    </style>
  </head>
  <body>
    <h1>Memory Palace</h1>
    <div id="map"></div>

    <script>
      async function initMap() {
        const position = { lat: -37.8136, lng: 144.9631 }; // Melbourne
        const { Map } = await google.maps.importLibrary("maps");
        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

        const map = new Map(document.getElementById("map"), {
          center: position,
          zoom: 12,
          mapId: "YOUR_MAP_ID"
        });

        new AdvancedMarkerElement({
          map,
          position,
          title: "Hello"
        });
      }
    </script>

    <script async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAshaqFlSY4XisEV4bq6aYuNFSgalz3mdE&loading=async&callback=initMap">
    </script>
  </body>
</html>
