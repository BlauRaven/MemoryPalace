<!DOCTYPE html>
<html>
  <head>
    <title>Memory Palace</title>
    <style>
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
      }
      h1 {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-family: 'Georgia', 'Garamond', serif;
        color: #3d2645;
        z-index: 10;
        margin: 0;
        padding: 15px 40px;
        background: linear-gradient(135deg, rgba(200, 150, 220, 0.9) 0%, rgba(180, 120, 210, 0.9) 100%);
        border-radius: 8px 45px 12px 40px;
        box-shadow: 0 6px 28px rgba(165, 100, 200, 0.35), inset 0 1px 2px rgba(255, 255, 255, 0.4);
        font-size: 2.5em;
        font-weight: bold;
        letter-spacing: 1px;
        filter: drop-shadow(2px 3px 4px rgba(0, 0, 0, 0.15));
        transform: translateX(-50%) skewY(-1deg);
      }
      #map {
        height: 100%;
        width: 100%;
        animation: fadeIn 2s ease-out;
      }
    </style>
  </head>
  <body>
    <h1>Memory Palace</h1>
    <div id="map"></div>

    <script>
      async function initMap() {
        const position = { lat: -37.8136, lng: 144.9631 }; // Melbourne
        const { Map } = await google.maps.importLibrary("maps");
        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

        const map = new Map(document.getElementById("map"), {
          center: position,
          zoom: 12,
          mapId: "YOUR_MAP_ID"
        });

        new AdvancedMarkerElement({
          map,
          position,
          title: "Hello"
        });
      }
    </script>

    <script async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAshaqFlSY4XisEV4bq6aYuNFSgalz3mdE&loading=async&callback=initMap">
    </script>
  </body>
</html>
